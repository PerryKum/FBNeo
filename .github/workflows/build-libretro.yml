name: Build libretro cores

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-libretro.yml'

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: Build
        run: make -j$(nproc) -C src/burner/libretro platform=unix
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: fbneo_libretro-linux-x86_64
          path: src/burner/libretro/fbneo_libretro.so
