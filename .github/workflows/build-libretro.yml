name: Build libretro cores

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  linux-aarch64:
    name: Linux aarch64 (.so for AURKNIX / ROCKNIX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git perl nasm \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu file binutils

      - name: Build aarch64 libretro core
        run: |
          make -j$(nproc) -C src/burner/libretro platform=unix \
            CC=aarch64-linux-gnu-gcc \
            CXX=aarch64-linux-gnu-g++ \
            HAVE_NEON=0 \
            USE_CYCLONE=0

      - name: Verify architecture
        run: |
          file src/burner/libretro/fbneo_libretro.so
          readelf -h src/burner/libretro/fbneo_libretro.so | grep -E 'Class|Machine'

      - name: Upload aarch64 .so
        uses: actions/upload-artifact@v4
        with:
          name: fbneo_libretro-linux-aarch64
          path: src/burner/libretro/fbneo_libretro.so

  windows-x86_64:
    name: Windows x86_64 (.dll for RetroArch PC)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-nasm
            make
            perl

      - name: Build Windows libretro core
        run: make -j$(nproc) -C src/burner/libretro

      - name: Verify output
        run: ls -la src/burner/libretro/fbneo_libretro.dll

      - name: Upload Windows .dll
        uses: actions/upload-artifact@v4
        with:
          name: fbneo_libretro-windows-x86_64
          path: src/burner/libretro/fbneo_libretro.dll
