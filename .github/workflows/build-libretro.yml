name: Build libretro cores

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: Publish GitHub release after all builds succeed
        type: boolean
        default: false
  push:
    branches: [master]

jobs:
  linux-x86_64:
    name: Linux x86_64 (.so)
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && (
        contains(github.event.head_commit.message, '[ci]') ||
        contains(github.event.head_commit.message, '[release]')
      ))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y build-essential git perl nasm file binutils

      - name: Build
        run: make -j$(nproc) -C src/burner/libretro platform=unix

      - name: Verify
        run: file src/burner/libretro/fbneo_libretro.so

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: fbneo_libretro-linux-x86_64
          path: src/burner/libretro/fbneo_libretro.so

  linux-aarch64:
    name: Linux aarch64 (.so)
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && (
        contains(github.event.head_commit.message, '[ci]') ||
        contains(github.event.head_commit.message, '[release]')
      ))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git perl nasm file binutils \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build
        run: |
          make -j$(nproc) -C src/burner/libretro platform=unix \
            CC=aarch64-linux-gnu-gcc \
            CXX=aarch64-linux-gnu-g++ \
            HAVE_NEON=0 \
            USE_CYCLONE=0

      - name: Verify
        run: |
          file src/burner/libretro/fbneo_libretro.so
          readelf -h src/burner/libretro/fbneo_libretro.so | grep -E 'Class|Machine'

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: fbneo_libretro-linux-aarch64
          path: src/burner/libretro/fbneo_libretro.so

  linux-armv7:
    name: Linux armv7 (.so)
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && (
        contains(github.event.head_commit.message, '[ci]') ||
        contains(github.event.head_commit.message, '[release]')
      ))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git perl nasm file binutils \
            gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf

      - name: Build
        run: |
          make -j$(nproc) -C src/burner/libretro platform=classic_armv7_a7 \
            CC=arm-linux-gnueabihf-gcc \
            CXX=arm-linux-gnueabihf-g++

      - name: Verify
        run: |
          file src/burner/libretro/fbneo_libretro.so
          readelf -h src/burner/libretro/fbneo_libretro.so | grep -E 'Class|Machine'

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: fbneo_libretro-linux-armv7
          path: src/burner/libretro/fbneo_libretro.so

  windows-x86_64:
    name: Windows x86_64 (.dll)
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && (
        contains(github.event.head_commit.message, '[ci]') ||
        contains(github.event.head_commit.message, '[release]')
      ))
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-nasm
            make
            perl

      - name: Build
        run: make -j$(nproc) -C src/burner/libretro

      - name: Verify
        run: file src/burner/libretro/fbneo_libretro.dll

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: fbneo_libretro-windows-x86_64
          path: src/burner/libretro/fbneo_libretro.dll

  windows-x86:
    name: Windows x86 (.dll)
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && (
        contains(github.event.head_commit.message, '[ci]') ||
        contains(github.event.head_commit.message, '[release]')
      ))
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW32
          update: true
          install: >-
            mingw-w64-i686-toolchain
            mingw-w64-i686-nasm
            make
            perl

      - name: Build
        run: make -j$(nproc) -C src/burner/libretro

      - name: Verify
        run: file src/burner/libretro/fbneo_libretro.dll

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: fbneo_libretro-windows-x86
          path: src/burner/libretro/fbneo_libretro.dll

  release:
    name: Publish release
    if: >
      (github.event_name == 'workflow_dispatch' && inputs.publish_release) ||
      (github.event_name == 'push' && contains(github.event.head_commit.message, '[release]'))
    needs:
      - linux-x86_64
      - linux-aarch64
      - linux-armv7
      - windows-x86_64
      - windows-x86
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/fbneo_libretro-linux-x86_64/fbneo_libretro.so release/fbneo_libretro-linux-x86_64.so
          cp artifacts/fbneo_libretro-linux-aarch64/fbneo_libretro.so release/fbneo_libretro-linux-aarch64.so
          cp artifacts/fbneo_libretro-linux-armv7/fbneo_libretro.so release/fbneo_libretro-linux-armv7.so
          cp artifacts/fbneo_libretro-windows-x86_64/fbneo_libretro.dll release/fbneo_libretro-windows-x86_64.dll
          cp artifacts/fbneo_libretro-windows-x86/fbneo_libretro.dll release/fbneo_libretro-windows-x86.dll
          cp src/burner/libretro/fbneoplus_libretro.info release/fbneoplus_libretro.info
          cp release/fbneo_libretro-linux-aarch64.so release/fbneoplus_libretro.so
          ls -la release/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0.03-perrykum-${{ github.run_number }}
          name: FinalBurn Neo (Kum) v1.0.0.03-perrykum (#${{ github.run_number }})
          body: |
            Automated libretro core build from commit ${{ github.sha }}.

            | File | Platform |
            |------|----------|
            | `fbneo_libretro-linux-x86_64.so` | Linux x86_64 |
            | `fbneo_libretro-linux-aarch64.so` | Linux aarch64 |
            | `fbneo_libretro-linux-armv7.so` | Linux armv7 |
            | `fbneo_libretro-windows-x86_64.dll` | Windows x86_64 |
            | `fbneo_libretro-windows-x86.dll` | Windows x86 |
            | `fbneoplus_libretro.so` | aarch64 build renamed for AURKNIX/ROCKNIX |
            | `fbneoplus_libretro.info` | libretro core info |

            AURKNIX/ROCKNIX: copy `fbneoplus_libretro.so` and `fbneoplus_libretro.info` to `/storage/cores/`.
          files: release/*
          generate_release_notes: false
